{{- if not .Values.config.existingConfigMap }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "houndr.fullname" . }}-config
  labels:
    {{- include "houndr.labels" . | nindent 4 }}
data:
  config.toml: |
    {{- if .Values.config.inline }}
    {{- .Values.config.inline | nindent 4 }}
    {{- else }}
    {{- include "houndr.config" . | nindent 4 }}
    {{- end }}
{{- end }}
